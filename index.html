<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>46号象限 · 绝对领域</title>
    <style>
        /* 全局设置：黑底绿字，极客风 */
        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* 纯黑背景 */
            color: #0F0; /* 黑客绿 */
            font-family: "Microsoft YaHei", "SimHei", sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        /* 容器 */
        .container {
            border: 2px solid #0F0;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px #0F0, inset 0 0 20px #0F0;
            background: rgba(0, 20, 0, 0.8);
            max-width: 90%;
            animation: breathe 2s infinite alternate;
        }

        /* 标题样式 */
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 2px 2px 0 #000;
        }

        /* 副标题 */
        .subtitle {
            font-size: 1.2em;
            margin-bottom: 30px;
            color: #fff;
            border-bottom: 1px dashed #0F0;
            padding-bottom: 15px;
        }

        /* 数据块 */
        .data-block {
            margin: 20px 0;
            font-size: 1.1em;
            line-height: 1.8;
        }

        .highlight {
            color: #fff;
            font-weight: bold;
            font-size: 1.4em;
            display: block;
            margin-top: 10px;
            animation: blink 1s step-end infinite;
        }

        /* 群号按钮风格 */
        .group-id {
            background: #0F0;
            color: #000;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: 900;
            font-size: 1.5em;
            display: inline-block;
            margin-top: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .group-id:active {
            transform: scale(0.95);
            background: #fff;
        }

        /* 简单的闪烁动画 */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 呼吸灯效果 */
        @keyframes breathe {
            from { box-shadow: 0 0 10px #0F0; }
            to { box-shadow: 0 0 30px #0F0, 0 0 10px #fff; }
        }

        /* 底部装饰 */
        .footer {
            margin-top: 30px;
            font-size: 0.8em;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>⚠️ 系统接入中...</h1>

        <div class="subtitle">
            // 正在扫描当前象限数据
        </div>

        <div class="data-block">
            <p>当前区域：【未知领域】</p>
            <p>核心算力：<span style="color:#fff; font-weight:bold;">英语</span></p>
            <p>在线节点：<span style="color:#fff; font-weight:bold;">46</span> 位</p>
        </div>

        <div class="data-block">
            <p>接入协议 / 传送门密钥：</p>
            <!-- 这里可以把 href="#" 改成你们群链接，如果是QQ群链接通常是 mqqapi://... 或者直接写群号 -->
            <div class="group-id">892785633</div>
        </div>

        <div class="footer">
            <p>SYSTEM READY // AWAITING INPUT</p>
        </div>
    </div>

</body>
</html>
