<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>站前路学校 · 八年级1班</title>
    <style>
        /* 1. 基础设置与液态背景动画 */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f0c29;  /* 深色底色 */
            overflow: hidden;
            position: relative;
        }

        /* 流动的液态球体 */
        .liquid-bg {
            position: absolute;
            width: 150vw;
            height: 150vw;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            animation: morph 15s infinite linear;
            filter: blur(80px); /* 模糊产生液态感 */
            opacity: 0.6;
            z-index: 1;
        }

        @keyframes morph {
            0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; transform: translate(0, 0) rotate(0deg); }
            33% { border-radius: 70% 30% 50% 50% / 30% 30% 70% 70%; transform: translate(10%, 10%) rotate(120deg); }
            66% { border-radius: 100% 60% 60% 100% / 100% 100% 60% 30%; transform: translate(-10%, -10%) rotate(240deg); }
            100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; transform: translate(0, 0) rotate(360deg); }
        }

        /* 2. 毛玻璃卡片容器 */
        .glass-card {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 450px;
            height: 600px;
            background: rgba(255, 255, 255, 0.1); /* 半透明白 */
            backdrop-filter: blur(20px); /* 核心：毛玻璃模糊 */
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: white;
        }

        /* 3. 内容区域（用于切换） */
        .content-area {
            flex: 1;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55); /* 丝滑切换动画 */
        }

        /* 界面1：默认显示 */
        #view-home { transform: translateY(0); position: absolute; width: 100%; height: 100%; }
        /* 界面2：默认隐藏在下方 */
        #view-secret { transform: translateY(100%); position: absolute; width: 100%; height: 100%; }

        /* 当激活切换类时，界面位置互换 */
        .slide-up #view-home { transform: translateY(-100%); }
        .slide-up #view-secret { transform: translateY(0); }

        /* 4. 文字与排版样式 */
        h1 { font-size: 28px; font-weight: 800; letter-spacing: 2px; margin-bottom: 15px; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        h2 { font-size: 18px; font-weight: 400; opacity: 0.9; margin-bottom: 30px; color: #e0e0ff; }
        .tag { background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px; font-size: 14px; margin: 5px; display: inline-block; backdrop-filter: blur(5px); }
        .highlight { font-size: 40px; font-weight: bold; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.6); display: block; margin: 20px 0; }
        .group-id { font-family: 'Courier New', monospace; font-size: 24px; letter-spacing: 3px; background: rgba(0,0,0,0.2); padding: 15px 30px; border-radius: 15px; border: 1px dashed rgba(255,255,255,0.5); }

        /* 5. 底部切换按钮 */
        .toggle-btn {
            position: absolute;
            bottom: 30px;
            background: rgba(255,255,255,0.9);
            color: #333;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: transform 0.2s, background 0.2s;
            z-index: 20;
        }
        .toggle-btn:active { transform: scale(0.9); background: #fff; }

    </style>
</head>
<body>

    <!-- 背景动画 -->
    <div class="liquid-bg"></div>

    <!-- 毛玻璃卡片 -->
    <div class="glass-card" id="mainCard">

        <!-- 界面 1：班级主页 -->
        <div class="content-area" id="view-home">
            <h1>站前路学校</h1>
            <h2>八年级 1 班</h2>
            <div style="margin-top: 20px;">
                <span class="tag">🚀 强势学科：英语</span>
                <span class="tag">⚡️ 全员恶人(划掉)学霸</span>
            </div>
            <p style="margin-top: 30px; font-size: 14px; opacity: 0.7; line-height: 1.6; padding: 0 20px;">
                这里汇聚了 46 位独特的灵魂<br>
                我们在知识的海洋里<br>
                偶尔冲浪，偶尔溺水，但永远向前。
            </p>
        </div>

        <!-- 界面 2：连接通道 -->
        <div class="content-area" id="view-secret">
            <h1>组织连接通道</h1>
            <h2>仅限内部成员</h2>
            <span style="font-size: 14px; opacity: 0.8;">学生群密钥</span>
            <div class="group-id">892785633</div>
            <p style="margin-top: 30px; font-size: 14px; opacity: 0.6;">
                输入密钥，加入我们要塞。<br>
                这里没有学渣，只有还没觉醒的战士。
            </p>
        </div>

        <!-- 切换按钮 -->
        <button class="toggle-btn" onclick="toggleView()">切换视图</button>

    </div>

    <!-- 切换逻辑脚本 -->
    <script>
        function toggleView() {
            const card = document.getElementById('mainCard');
            // 切换 CSS 类，触发上面的 slide-up 动画
            card.classList.toggle('slide-up');
        }
    </script>

</body>
</html>
