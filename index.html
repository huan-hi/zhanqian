<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>八年级1班 · 液态档案</title>
    <style>
        /* 1. 基础设置 */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 2. 液态背景 */
        .liquid-container {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            filter: blur(60px);
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            opacity: 0.8;
            animation: move 20s infinite alternate;
        }

        .blob-1 { top: 10%; left: 20%; width: 500px; height: 500px; background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); animation-duration: 25s; }
        .blob-2 { bottom: 20%; right: 10%; width: 400px; height: 400px; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); animation-duration: 30s; animation-direction: alternate-reverse; }
        .blob-3 { bottom: 10%; left: 30%; width: 300px; height: 300px; background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); animation-duration: 22s; }

        @keyframes move { from { transform: translate(0, 0) scale(1); } to { transform: translate(50px, -50px) scale(1.1); } }

        /* 3. 玻璃主容器 */
        .glass-card {
            width: 90%;
            max-width: 1000px;
            height: 750px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-top: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.1), inset 0 0 20px rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* 4. 导航栏 (顶部/底部通用) */
        .nav-bar {
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            flex-shrink: 0;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #2d3436;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            position: relative; /* 为游标定位 */
        }

        /* 导航链接样式 */
        .nav-link {
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: #636e72;
            transition: color 0.3s ease;
            position: relative;
            z-index: 1; /* 保证文字在游标上面 */
            padding: 5px 0;
        }

        .nav-link:hover { color: #2d3436; }

        /* 液态游标 - 那个会跑的胶囊 */
        .nav-liquid {
            position: absolute;
            bottom: -5px;
            left: 0;
            height: 6px;
            width: 20px; /* 初始宽度 */
            background: #2d3436;
            border-radius: 3px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); /* 果冻动画曲线 */
            z-index: 0;
        }

        /* 5. 内容区域 */
        .content {
            flex: 1;
            padding: 50px;
            overflow-y: auto;
            position: relative;
            -webkit-overflow-scrolling: touch;
        }

        .content::-webkit-scrollbar { width: 0px; }

        /* 内容切换动画 */
        .view { display: none; opacity: 0; transform: translateY(30px) scale(0.98); transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .view.active { display: block; opacity: 1; transform: translateY(0) scale(1); }

        /* 排版 */
        h1 { font-size: 48px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 20px; background: linear-gradient(45deg, #2d3436, #636e72); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: #b2bec3; font-weight: 700; margin-bottom: 30px; display: block; }
        .text-block { font-size: 17px; line-height: 1.8; color: #555; margin-bottom: 30px; text-align: justify; }
        .highlight { color: #6c5ce7; font-weight: 700; background: rgba(108, 92, 231, 0.1); padding: 2px 6px; border-radius: 4px; }

        /* 数据网格 */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .data-card { background: rgba(255, 255, 255, 0.5); padding: 30px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 10px 30px rgba(0,0,0,0.03); transition: transform 0.3s ease; }
        .data-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.8); }
        .number { font-size: 50px; font-weight: 800; color: #2d3436; margin-bottom: 10px; font-family: "Courier New", monospace; }
        .label { font-size: 13px; color: #b2bec3; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

        /* 联系卡片 */
        .contact-box { background: #fff; padding: 50px; border-radius: 24px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.05); margin-top: 20px; border: 1px solid #f0f0f0; }
        .id-number { font-size: 36px; font-weight: 700; letter-spacing: 2px; margin: 20px 0; color: #2d3436; }

        /* =========================================
           手机端专属优化
           ========================================= */
        @media (max-width: 768px) {
            .glass-card {
                width: 100%;
                height: 100%;
                border-radius: 0;
                border: none;
                box-shadow: none;
            }

            /* 底部导航栏样式 */
            .nav-bar {
                position: absolute;
                bottom: 0;
                left: 0;
                width: 100%;
                padding: 15px 20px;
                border-top: 1px solid rgba(255, 255, 255, 0.2);
                border-bottom: none;
                background: rgba(255, 255, 255, 0.1); /* 更透明 */
                backdrop-filter: blur(20px); /* 增强模糊 */
                justify-content: center;
                z-index: 100;
            }

            .logo { display: none; }

            .nav-links {
                width: 100%;
                justify-content: space-around;
                gap: 0;
            }

                font-size:
