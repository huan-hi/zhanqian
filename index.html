<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>站前路学校 · 八年级1班指挥系统</title>
    <style>
        /* 1. 全局设置：深空黑背景 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
            background-color: #050505;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px; /* 网格背景 */
        }

        /* 2. 主容器：全息终端 */
        .terminal-container {
            width: 95%;
            max-width: 1000px;
            height: 700px;
            background: rgba(10, 15, 20, 0.9);
            border: 1px solid #00d2ff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            display: flex;
            overflow: hidden;
            position: relative;
            backdrop-filter: blur(10px);
        }

        /* 装饰角标 */
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #00d2ff;
            z-index: 10;
        }
        .top-left { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .top-right { top: -2px; right: -2px; border-left: none; border-bottom: none; }
        .bottom-left { bottom: -2px; left: -2px; border-right: none; border-top: none; }
        .bottom-right { bottom: -2px; right: -2px; border-left: none; border-top: none; }

        /* 3. 左侧导航栏 */
        .sidebar {
            width: 220px;
            background: rgba(0, 20, 30, 0.8);
            border-right: 1px solid #00d2ff;
            padding: 30px 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: #8899a6;
            padding: 15px 25px;
            text-align: left;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
            border-left: 3px solid transparent;
            font-family: "Microsoft YaHei", sans-serif;
        }

        .nav-btn:hover {
            background: rgba(0, 210, 255, 0.1);
            color: #fff;
            padding-left: 30px;
        }

        .nav-btn.active {
            background: rgba(0, 210, 255, 0.2);
            color: #00d2ff;
            border-left: 3px solid #00d2ff;
            text-shadow: 0 0 10px #00d2ff;
        }

        /* 4. 右侧内容显示区 */
        .main-display {
            flex: 1;
            padding: 40px;
            position: relative;
            overflow-y: auto;
        }

        /* 界面切换逻辑 */
        .interface {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }
        .interface.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 内容样式 */
        h1 {
            font-size: 32px;
            color: #fff;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #00d2ff;
            padding-bottom: 10px;
            display: inline-block;
        }

        .subtitle {
            color: #00d2ff;
            font-size: 14px;
            margin-bottom: 30px;
            font-family: "Courier New", monospace;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .data-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 210, 255, 0.3);
            padding: 20px;
            border-radius: 5px;
            transition: transform 0.2s;
        }

        .data-card:hover {
            transform: scale(1.02);
            background: rgba(0, 210, 255, 0.1);
        }

        .big-number {
            font-size: 40px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.8);
        }

        .highlight-text {
            color: #00d2ff;
            font-weight: bold;
        }

        .group-box {
            text-align: center;
            padding: 40px;
            border: 2px dashed #00d2ff;
            background: rgba(0, 210, 255, 0.05);
            margin-top: 20px;
        }

        .group-id {
            font-size: 36px;
            color: #fff;
            font-family: "Courier New", monospace;
            letter-spacing: 5px;
            margin: 20px 0;
            text-shadow: 0 0 20px #00d2ff;
        }

        /* 底部署名 */
        .footer-credit {
            position: absolute;
            bottom: 20px;
            right: 40px;
            font-size: 12px;
            color: #555;
            font-family: "Courier New", monospace;
            text-transform: uppercase;
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .terminal-container { flex-direction: column; height: 90vh; }
            .sidebar { width: 100%; padding: 10px; flex-direction: row; overflow-x: auto; }
            .nav-btn { padding: 10px 15px; font-size: 14px; white-space: nowrap; }
            .main-display { padding: 20px; }
            .data-grid { grid-template-columns: 1fr; }
            .footer-credit { display: none; } /* 手机端隐藏署名防遮挡 */
        }
    </style>
</head>
<body>

        <div class="corner bottom-right"></div>

        <!-- 左侧导航 -->
        <div class="sidebar">

            <button class="nav-btn" onclick="switchTab('stats')">📊 荣耀战绩</button>
            <button class="nav-btn" onclick="switchTab('subject')">📚 核心学科</button>
            <button class="nav-btn" onclick="switchTab('connect')">📡 接入网络</button>
        </div>

        <!-- 右侧显示区 -->
        <div class="main-display">
